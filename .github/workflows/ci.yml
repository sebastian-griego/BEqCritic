name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e '.[dev]'
      - name: Verify reproducibility
        run: python scripts/verify_reproducibility.py --report-json runs/reproducibility-${{ matrix.python-version }}.json
      - name: Upload reproducibility report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reproducibility-report-py${{ matrix.python-version }}
          path: runs/reproducibility-${{ matrix.python-version }}.json
          if-no-files-found: ignore

