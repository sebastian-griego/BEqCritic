name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e '.[dev]'
      - name: Compile Python sources
        run: python -m compileall -q beqcritic scripts tests
      - name: Check generated NLVerifier paper artifacts
        run: |
          python scripts/summarize_nlverifier_paper_metrics.py \
            --results-dir results \
            --output-json results/nlverifier_paper_metrics.json \
            --output-md results/nlverifier_paper_metrics.md \
            --output-tex paper/generated/nlverifier_main_table.tex \
            --check
      - name: Verify NLVerifier source hashes
        run: |
          python scripts/summarize_nlverifier_paper_metrics.py \
            --output-json results/nlverifier_paper_metrics.json \
            --verify-source-hashes
      - name: Tests
        run: |
          python -m pytest -q

